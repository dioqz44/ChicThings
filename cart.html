<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chic Things</title>
  <link rel="icon" type="image/png" href="icons/title-logo.png">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/nav.css">
  <link rel="stylesheet" href="styles/cart.css">
</head>
<body>

  <div class="top-bar">
    <div class="left-section">
      <a href="index.html" class="brand-link">
        <img class="img" src="icons/logo.png" alt="Chic Things Logo">
        <span>CHIC THINGS</span>
      </a>
    </div>

    <div class="right-section">
      <button class="signin-button" id="signinButton">
        <span id="userDisplay">Sign In</span>
      </button>

      <a href="cart.html" class="cart-button" id="cartButton">
        <span class="cart-text">🛒 Cart</span>
        <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </div>

  <main class="cart-page">
    <a href="index.html" class="back-link">← Continue Shopping</a>

    <div class="cart-title">Your Cart</div>

    <div class="cart-layout">
      <section class="cart-items" id="cartItems">
        <!-- Cart items will be inserted here by JavaScript -->
      </section>

      <aside class="cart-summary">
        <div class="summary-title">Order Summary</div>

        <div class="summary-row">
          <span>Total Items</span>
          <span id="totalItems">0</span>
        </div>

        <div class="summary-total">
          <span>Total</span>
          <span id="totalAmount">₱0</span>
        </div>

        <button class="checkout-button">Proceed to Checkout</button>
      </aside>
    </div>
  </main>

  <script src="js/cart.js"></script>
</body>
</html>
